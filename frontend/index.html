<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Lineal - Búsqueda en Profundidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-700 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2"> Puzzle Lineal DFS</h1>
            <p class="text-slate-300">Búsqueda en Profundidad (DFS)</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Panel izquierdo - Configuración -->
            <div class="bg-white/10 backdrop-blur rounded-2xl p-6 shadow-xl">
                <h2 class="text-xl font-semibold text-white mb-4"> Configuración</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-slate-200 mb-3">Estado Inicial</label>
                        <div class="flex gap-3 justify-center">
                            <input type="number" id="e0" value="4" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                            <input type="number" id="e1" value="2" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                            <input type="number" id="e2" value="3" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                            <input type="number" id="e3" value="1" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-slate-200 mb-3">Estado Final (Solución)</label>
                        <div class="flex gap-3 justify-center">
                            <input type="number" id="s0" value="1" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                            <input type="number" id="s1" value="2" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                            <input type="number" id="s2" value="3" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                            <input type="number" id="s3" value="4" class="w-16 h-16 text-center text-2xl font-bold rounded-xl bg-slate-800 text-white border border-slate-600 focus:border-purple-500 focus:outline-none">
                        </div>
                    </div>
                    <button id="btnResolver" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
                        <i class="bi bi-play-fill"></i> Resolver Puzzle
                    </button>
                </div>
            </div>

            <!-- Panel derecho - Resultado -->
            <div class="bg-white/10 backdrop-blur rounded-2xl p-6 shadow-xl">
                <h2 class="text-xl font-semibold text-white mb-4"> Resultado</h2>
                <div id="resultado" class="space-y-4">
                    <div class="text-center text-slate-300 py-8">
                        <i class="bi bi-calculator text-4xl mb-2 block"></i>
                        <p>Esperando solución...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ruta completa -->
        <div class="mt-6 bg-white/10 backdrop-blur rounded-2xl p-6 shadow-xl">
            <h2 class="text-xl font-semibold text-white mb-4">🔗 Ruta Completa</h2>
            <div id="ruta" class="text-slate-300 text-sm font-mono overflow-x-auto pb-2">
                <p class="text-center text-slate-400">Presiona "Resolver" para ver la ruta</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://puzzle-lineal-ansv.onrender.com";
        
        document.getElementById('btnResolver').addEventListener('click', async () => {
            const estadoInicial = [
                parseInt(document.getElementById('e0').value),
                parseInt(document.getElementById('e1').value),
                parseInt(document.getElementById('e2').value),
                parseInt(document.getElementById('e3').value)
            ];
            
            const solucion = [
                parseInt(document.getElementById('s0').value),
                parseInt(document.getElementById('s1').value),
                parseInt(document.getElementById('s2').value),
                parseInt(document.getElementById('s3').value)
            ];
            
            // Mostrar loading
            document.getElementById('resultado').innerHTML = `
                <div class="text-center text-slate-300 py-8">
                    <i class="bi bi-hourglass-split text-4xl mb-2 block animate-pulse"></i>
                    <p>Resolviendo puzzle...</p>
                </div>
            `;
            document.getElementById('ruta').innerHTML = `<p class="text-center text-slate-400">Calculando ruta...</p>`;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado_inicial: estadoInicial, solucion: solucion })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Mostrar resultado resumido
                    document.getElementById('resultado').innerHTML = `
                        <div class="bg-slate-800/50 rounded-xl p-4">
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <p class="text-slate-400 text-sm">Estado Inicial</p>
                                    <div class="flex gap-2 mt-2 justify-center">
                                        ${data.estado_inicial.map(n => `<span class="w-12 h-12 flex items-center justify-center bg-purple-600 rounded-lg font-bold text-lg">${n}</span>`).join('')}
                                    </div>
                                </div>
                                <div>
                                    <p class="text-slate-400 text-sm">Estado Final</p>
                                    <div class="flex gap-2 mt-2 justify-center">
                                        ${data.estado_final.map(n => `<span class="w-12 h-12 flex items-center justify-center bg-emerald-600 rounded-lg font-bold text-lg">${n}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <div class="text-center pt-2 border-t border-slate-700">
                                <p class="text-3xl font-bold text-emerald-400">${data.pasos}</p>
                                <p class="text-slate-400 text-sm">movimientos realizados</p>
                            </div>
                        </div>
                    `;
                    
                    // Mostrar ruta completa
                    let rutaHtml = '<div class="flex flex-wrap gap-4 justify-center items-center">';
                    data.ruta.forEach((estado, idx) => {
                        rutaHtml += `
                            <div class="bg-slate-800 rounded-xl p-3 min-w-[120px] text-center">
                                <span class="text-xs text-slate-400">Paso ${idx}</span>
                                <div class="flex gap-1 justify-center mt-2">
                                    ${estado.map(n => `<span class="w-8 h-8 flex items-center justify-center bg-purple-600 rounded-md text-sm font-bold">${n}</span>`).join('')}
                                </div>
                            </div>
                        `;
                        if (idx < data.ruta.length - 1) {
                            rutaHtml += '<i class="bi bi-arrow-right text-slate-500 text-2xl"></i>';
                        }
                    });
                    rutaHtml += '</div>';
                    document.getElementById('ruta').innerHTML = rutaHtml;
                    
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                document.getElementById('resultado').innerHTML = `
                    <div class="bg-red-500/20 border border-red-500 rounded-xl p-4 text-center">
                        <i class="bi bi-exclamation-triangle text-2xl text-red-400 mb-2 block"></i>
                        <p class="text-red-300">Error: ${error.message}</p>
                        <p class="text-slate-400 text-sm mt-2">Verifica que el backend esté corriendo en puerto 5000</p>
                    </div>
                `;
                console.error(error);
            }
        });
    </script>
</body>
</html>
